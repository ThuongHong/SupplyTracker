<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="SupplyTracker — global supply chain risk dashboard" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Newsreader:opsz,wght@6..72,400..700&display=swap" rel="stylesheet" />
    <title>SupplyTracker</title>
    <script>
      // Apply saved theme before React hydration to avoid flash
      ;(function () {
        var theme = localStorage.getItem('theme')
        var resolved = theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches) ? 'dark' : 'light'
        document.documentElement.dataset.theme = resolved
        if (resolved === 'dark') {
          document.documentElement.classList.add('dark')
        }
      })()
    </script>
  </head>
  <body class="antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
