name: pipeline-cron

# Drives the workerless deploy's data pipeline (replaces celery-beat).
# Hits the bearer-protected /api/v1/cron/run on the Render backend.
on:
  schedule:
    # Daily 10:00 UTC = 17:00 Vietnam (ICT, UTC+7). GitHub may delay scheduled
    # runs under load; daily tolerates it.
    - cron: "0 10 * * *"
  workflow_dispatch:
    inputs:
      jobs:
        description: "Comma-separated subset of collect,score,forecast,narrate"
        default: "collect,score,forecast,narrate"

concurrency:
  group: pipeline-cron
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Warm up the sleeping Render instance
        env:
          BACKEND_URL: ${{ vars.BACKEND_URL }}
        run: |
          # Render free spins down after 15 min idle (~30 s cold start). Poll the
          # cheap health endpoint until it answers, so the heavy pipeline call
          # below isn't the one paying the cold-start cost. Retry-safe: GET only.
          for attempt in $(seq 1 15); do
            code=$(curl -sS -o /dev/null -w '%{http_code}' \
              --max-time 60 --connect-timeout 30 \
              "${BACKEND_URL}/api/v1/health" || true)
            echo "warmup ${attempt}: HTTP ${code:-none}"
            [ "$code" = "200" ] && exit 0
            sleep 20
          done
          echo "::warning::backend did not warm up; running pipeline anyway"

      - name: Run pipeline
        env:
          BACKEND_URL: ${{ vars.BACKEND_URL }}
          TOKEN: ${{ secrets.SYNC_BEARER_TOKEN }}
          JOBS: ${{ github.event.inputs.jobs || 'collect,score,forecast,narrate' }}
        run: |
          # Each job is a SEPARATE one-shot call (no blind retry). A slow job
          # therefore never re-triggers an earlier one — the old single-call +
          # 3x retry could re-run `collect` from scratch on a forecast timeout.
          # --max-time is generous because the whole pipeline runs inline in the
          # web process on a single free-tier CPU.
          fails=""
          for job in $(echo "${JOBS}" | tr ',' ' '); do
            echo "=== ${job} ==="
            code=$(curl -sS -o /tmp/body.txt -w '%{http_code}' \
              -X POST "${BACKEND_URL}/api/v1/cron/run?jobs=${job}" \
              -H "Authorization: Bearer ${TOKEN}" \
              --max-time 1500 --connect-timeout 60 || true)
            echo "HTTP ${code:-no-response}"
            cat /tmp/body.txt 2>/dev/null || true
            echo
            [ "$code" = "200" ] || fails="${fails} ${job}"
          done
          if [ -n "${fails}" ]; then
            echo "::error::failed jobs:${fails}"
            exit 1
          fi
